<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTM Capability Model</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FDFCF9;
    --surface-hover: #F0EDE6;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.16);
    --text-primary: #1A1916;
    --text-secondary: #6B6860;
    --text-tertiary: #9E9B94;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* Header */
  header {
    background: var(--text-primary);
    color: var(--bg);
    padding: 48px 48px 40px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 400px; height: 400px;
    border-radius: 50%;
    border: 60px solid rgba(255,255,255,0.04);
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -120px; left: 200px;
    width: 300px; height: 300px;
    border-radius: 50%;
    border: 40px solid rgba(255,255,255,0.03);
    pointer-events: none;
  }
  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 4vw, 46px);
    line-height: 1.1;
    font-weight: 400;
    color: #F5F3EE;
    margin-bottom: 12px;
    position: relative;
  }
  .header-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    max-width: 520px;
    position: relative;
  }
  .header-owners {
    display: flex; gap: 20px; flex-wrap: wrap;
    margin-top: 28px; position: relative;
  }
  .owner-pill {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 5px 12px 5px 6px;
  }
  .owner-pill-dot {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; flex-shrink: 0;
  }
  .owner-pill-text { font-size: 12px; color: rgba(255,255,255,0.7); }
  .owner-pill-name { font-size: 12px; color: rgba(255,255,255,0.95); font-weight: 500; }

  /* Main */
  main { padding: 32px 48px 64px; }

  /* Canvas */
  .cap-canvas {
    display: grid;
    grid-template-rows: auto auto auto;
    gap: 6px;
  }

  /* Spanning band (top / bottom) */
  .cap-band {
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .cap-band-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
  }
  .cap-band-title {
    font-family: 'DM Serif Display', serif;
    font-size: 15px; font-weight: 400; color: var(--text-primary);
  }
  .cap-band-owner { font-size: 11px; color: var(--text-tertiary); font-weight: 300; }
  .cap-band-count {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--text-tertiary);
  }
  .cap-band-jobs {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--border);
    gap: 1px;
  }

  /* Pillar row */
  .cap-pillar-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .cap-pillar {
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .cap-pillar-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  .cap-pillar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 14px; font-weight: 400; color: var(--text-primary);
    margin-bottom: 3px;
    display: flex; align-items: center; gap: 8px;
  }
  .cap-pillar-owner { font-size: 11px; color: var(--text-tertiary); font-weight: 300; }
  .cap-pillar-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--text-tertiary);
    margin-left: auto;
  }
  .cap-pillar-meta { display: flex; align-items: center; }
  .cap-pillar-jobs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--border);
    gap: 1px;
  }

  /* NEW: highlight ring for Sales Ops pillar */
  .cap-pillar.is-new {
    border-color: rgba(30, 100, 140, 0.35);
    box-shadow: 0 0 0 3px rgba(30, 100, 140, 0.08);
  }
  .new-badge {
    display: inline-flex;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: #E6F4FB;
    color: #1E648C;
    border: 1px solid rgba(30, 100, 140, 0.2);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Owner filter buttons */
  .owner-filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 20px; position: relative;
  }
  .owner-filter-btn {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 5px 14px 5px 7px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    font-family: 'Outfit', sans-serif;
  }
  .owner-filter-btn:hover {
    background: rgba(255,255,255,0.13);
    border-color: rgba(255,255,255,0.3);
  }
  .owner-filter-btn.active {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.5);
  }
  .owner-filter-btn.active .ofb-dot { box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }
  .ofb-dot {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; flex-shrink: 0;
    transition: box-shadow 0.15s;
  }
  .ofb-label { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; }
  .ofb-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: rgba(255,255,255,0.45);
    margin-left: 2px;
  }

  /* Job cell — shared */
  .cap-job-cell {
    background: var(--surface);
    padding: 9px 12px;
    transition: background 0.15s, opacity 0.2s;
  }
  .cap-job-cell:hover { background: var(--surface-hover); }
  .cap-job-cell.dimmed {
    opacity: 0.2;
  }
  .cap-job-cell.highlighted {
    background: var(--highlight-bg, #FFFBE6);
    box-shadow: inset 3px 0 0 var(--highlight-color, #F0C000);
  }
  .cap-job-cell.highlighted:hover {
    background: var(--highlight-bg, #FFFBE6);
  }
  .cap-job-num {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--text-tertiary);
    display: block; margin-bottom: 2px;
  }
  .cap-job-title {
    font-size: 11px; font-weight: 500;
    color: var(--text-primary); line-height: 1.35;
    display: block; margin-bottom: 3px;
  }
  .cap-job-sub {
    font-size: 10px; color: var(--text-tertiary);
    font-weight: 300; line-height: 1.35; display: block;
  }

  /* Color accent bar on pillar */
  .pillar-accent {
    width: 3px; min-height: 18px;
    border-radius: 2px; flex-shrink: 0; align-self: stretch;
  }

  /* Overlap annotation */
  .overlap-note {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }
  .overlap-note-title {
    font-family: 'DM Serif Display', serif;
    font-size: 14px; font-weight: 400;
    color: var(--text-primary);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .overlap-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .overlap-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .overlap-item-job {
    font-size: 11px; font-weight: 500;
    color: var(--text-primary); line-height: 1.35;
    margin-bottom: 4px;
  }
  .overlap-item-note {
    font-size: 10px; color: var(--text-tertiary); font-weight: 300; line-height: 1.35;
  }
  .overlap-tag {
    display: inline-flex; align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em;
    border-radius: 3px; padding: 1px 5px; margin-bottom: 4px;
  }

  @media (max-width: 1200px) {
    .cap-pillar-row { grid-template-columns: repeat(3, 1fr); }
    .cap-band-jobs { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 900px) {
    main, header { padding-left: 24px; padding-right: 24px; }
    .cap-pillar-row { grid-template-columns: 1fr 1fr; }
    .cap-band-jobs { grid-template-columns: repeat(3, 1fr); }
    .cap-pillar-jobs { grid-template-columns: 1fr; }
    .overlap-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .cap-band-jobs { grid-template-columns: 1fr 1fr; }
    .cap-pillar-row { grid-template-columns: 1fr; }
    .overlap-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>

function getCat(id) { return categories.find(c => c.id === id); }

function jobCell(job, idx) {
  const ownerAttr = job.owner ? ' data-owner="' + job.owner + '"' : '';
  return '<div class="cap-job-cell"' + ownerAttr + '>' +
    '<span class="cap-job-num">' + String(idx + 1).padStart(2, '0') + '</span>' +
    '<span class="cap-job-title">' + job.title + '</span>' +

  '</div>';

function spanBand(catId) {

      (cat.owner ? '<span class="cap-band-owner">— ' + cat.owner + '</span>' : '') +
      '<span class="cap-band-count">' + cat.jobs.length + ' jobs</span>' +
    '</div>' +
    '<div class="cap-band-jobs">' +
      cat.jobs.map((job, i) => jobCell(job, i)).join('') +
    '</div>' +
  '</div>';
}

function pillar(catId) {
  const cat = getCat(catId);
  const newClass = cat.isNew ? ' is-new' : '';
  const newBadge = cat.isNew ? '<span class="new-badge">New</span>' : '';
  return '<div class="cap-pillar' + newClass + '">' +
    '<div class="cap-pillar-header">' +
      '<div class="cap-pillar-title">' +
        '<div class="pillar-accent" style="background:' + cat.color + '"></div>' +
        cat.label + newBadge +
      '</div>' +
      '<div class="cap-pillar-meta">' +
        (cat.owner ? '<span class="cap-pillar-owner">' + cat.owner + '</span>' : '') +
        '<span class="cap-pillar-count">' + cat.jobs.length + ' jobs</span>' +
      '</div>' +
    '</div>' +
    '<div class="cap-pillar-jobs">' +
      cat.jobs.map((job, i) => jobCell(job, i)).join('') +
    '</div>' +
  '</div>';
}

// Render canvas — Sales Ops added to pillar row
document.getElementById('canvas').innerHTML =
  spanBand('gtmstrategy') +
  '<div class="cap-pillar-row">' +
    pillar('marketing') +
    pillar('leadgen') +
    pillar('partnerships') +
    pillar('sales') +
    pillar('salesops') +
  '</div>' +
  spanBand('revops');

// Render owner pills in header
const pillOrder = ['gtmstrategy', 'marketing', 'leadgen', 'partnerships', 'sales', 'salesops', 'revops'];
document.getElementById('ownerPills').innerHTML = pillOrder.map(id => {
  const cat = getCat(id);
  return '<div class="owner-pill">' +
    '<div class="owner-pill-dot" style="background:' + cat.bg + ';color:' + cat.color + '">' + cat.label.slice(0,2).toUpperCase() + '</div>' +
    '<span class="owner-pill-name">' + cat.label + '</span>' +
  '</div>';
}).join('');

// Build owner filter buttons
const ownerColors = {
  'Tyler': { bg: '#E8E6FF', color: '#3D35A0' },
  'Jess':  { bg: '#E1F5EE', color: '#0F6E56' },
  'Grant': { bg: '#FAEEDA', color: '#BA7517' },
};

const allJobs = categories.flatMap(c => c.jobs);
const ownerCounts = {};
allJobs.forEach(j => { if (j.owner) ownerCounts[j.owner] = (ownerCounts[j.owner] || 0) + 1; });

let activeOwner = null;

function applyFilter(owner) {
  const cells = document.querySelectorAll('.cap-job-cell');
  cells.forEach(cell => {
    cell.classList.remove('highlighted', 'dimmed');
    if (owner) {
      const isMatch = owner === '__unassigned__'
        ? !cell.dataset.owner
        : cell.dataset.owner === owner;
      if (isMatch) {
        const c = owner === '__unassigned__'
          ? { bg: '#F0EDE6', color: '#6B6860' }
          : (ownerColors[owner] || { bg: '#F5F3EE', color: '#1A1916' });
        cell.style.setProperty('--highlight-bg', c.bg);
        cell.style.setProperty('--highlight-color', c.color);
        cell.classList.add('highlighted');
      } else {
        cell.classList.add('dimmed');
      }
    }
  });
  document.querySelectorAll('.owner-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.owner === owner);
  });
}

const unassignedCount = allJobs.filter(j => !j.owner).length;
const knownOwners = Object.keys(ownerCounts);
document.getElementById('ownerFilters').innerHTML = knownOwners.map(owner => {
  const c = ownerColors[owner] || { bg: '#EEE', color: '#333' };
  const initials = owner.slice(0, 2).toUpperCase();
  return '<button class="owner-filter-btn" data-owner="' + owner + '" onclick="onFilterClick(this)">' +
    '<div class="ofb-dot" style="background:' + c.bg + ';color:' + c.color + '">' + initials + '</div>' +
    '<span class="ofb-label">' + owner + '</span>' +
    '<span class="ofb-count">' + ownerCounts[owner] + '</span>' +
  '</button>';
}).join('') +
'<button class="owner-filter-btn" data-owner="__unassigned__" onclick="onFilterClick(this)">' +
  '<div class="ofb-dot" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-size:11px;">—</div>' +
  '<span class="ofb-label" style="color:rgba(255,255,255,0.6);">Unassigned</span>' +
  '<span class="ofb-count">' + unassignedCount + '</span>' +
'</button>';

function onFilterClick(btn) {
  const owner = btn.dataset.owner;
  activeOwner = activeOwner === owner ? null : owner;
  applyFilter(activeOwner);
}

// Render overlap note
document.getElementById('overlapNote').innerHTML =
  '<div class="overlap-note-title">' +
    '<div style="width:3px;min-height:16px;border-radius:2px;background:#1E648C;flex-shrink:0;align-self:stretch;"></div>' +
    'Boundary notes — Sales Ops vs. existing categories' +
  '</div>' +
  '<div class="overlap-grid">' +
    overlaps.map(o =>
      '<div class="overlap-item">' +
        '<div><span class="overlap-tag" style="background:' + o.overlapBg + ';color:' + o.overlapColor + '">' + o.overlapsWith + '</span></div>' +
        '<div class="overlap-item-job">' + o.salesOpsJob + '</div>' +
        '<div class="overlap-item-note">' + o.note + '</div>' +
      '</div>'
    ).join('') +
  '</div>';
</script>
</body>
</html>
